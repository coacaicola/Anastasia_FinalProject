<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moving Dance and Art</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #ffd29d;
  --cream: #fff4e6;
  --dark-rose: #8a3b2e;
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background: linear-gradient(to bottom, #ffb36b, #ff7e5f, #6a3d8f);
  font-family: 'Lato', sans-serif;
  color: var(--cream);
}

#sketch-container {
  position:fixed; inset:0; z-index:0;
}
#sketch-container canvas {
  display:block; position:absolute; top:0; left:0;
}

/* UI overlay */
#ui {
  position:fixed; inset:0; z-index:10;
  pointer-events:none;
  display:flex; flex-direction:column;
}

#ui .header {
  width:100%; text-align:center;
  padding:22px 0 18px;
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,6vw,78px);
  letter-spacing:14px;
  color:var(--cream);
  background:rgba(0,0,0,0.18);
  backdrop-filter:blur(10px);
  box-shadow:0 6px 30px rgba(0,0,0,0.25);
  transition:opacity 0.5s ease, transform 0.5s ease;
}
#ui .header span {
  display:inline-block;
  transition:transform 0.25s ease, color 0.25s ease;
  cursor:default;
}
#ui .header span:hover {
  transform:translateY(-6px) scale(1.2);
  color:var(--gold);
}

#ui .row { display:flex; flex:1; }

#ui .sidebar {
  width:min(310px,28vw);
  padding:40px 32px;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(14px);
  border-right:1px solid rgba(255,255,255,0.12);
  display:flex; flex-direction:column; gap:16px;
  pointer-events:auto;
  transition:opacity 0.5s ease, transform 0.5s ease;
}
#ui .sidebar h2 {
  font-family:'Bebas Neue',sans-serif;
  font-size:30px; letter-spacing:5px;
  color:#fff2cc; margin-bottom:4px;
}
#ui .sidebar p { font-size:16px; line-height:1.65; color:#fff7eb; font-weight:300; }
#ui .sidebar .highlight { color:var(--gold); font-weight:700; }
#ui .sidebar .note { font-size:14px; opacity:0.85; margin-top:6px; }

/* hide UI on page 2 */
body.page2 #ui .header {
  opacity:0; pointer-events:none; transform:translateY(-10px);
}
body.page2 #ui .sidebar {
  opacity:0; pointer-events:none; transform:translateX(-16px);
}

#switch-btn {
  position:fixed; bottom:28px; right:28px; z-index:20;
  padding:12px 26px; border:none; border-radius:50px;
  font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px;
  cursor:pointer; background:#fff1d6; color:var(--dark-rose);
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
  transition:transform 0.2s ease, background 0.2s ease;
}
#switch-btn:hover { transform:translateY(-3px); background:var(--gold); }

#page-pip {
  position:fixed; bottom:36px; left:50%;
  transform:translateX(-50%); z-index:20;
  display:flex; gap:10px;
}
.pip {
  width:10px; height:10px; border-radius:50%;
  background:rgba(255,255,255,0.3);
  border:1.5px solid rgba(255,255,255,0.6);
  transition:background 0.3s, transform 0.3s;
}
.pip.active { background:var(--gold); transform:scale(1.35); }
</style>
</head>
<body class="page1">

<div id="sketch-container"></div>

<div id="ui">
  <div class="header">
    <span>S</span><span>P</span><span>A</span><span>C</span><span>E</span>
  </div>
  <div class="row">
    <div class="sidebar">
      <h2>Instructions</h2>
      <p><span class="highlight">Move your body!</span></p>
      <p>Your camera detects motion and paints it onto the canvas.</p>
      <p class="note">
        Press <span class="highlight">SPACEBAR</span> or the button to switch sketches.
      </p>
    </div>
  </div>
</div>

<button id="switch-btn">Switch ›</button>

<div id="page-pip">
  <div class="pip active" id="pip1"></div>
  <div class="pip"        id="pip2"></div>
</div>

<script>
/* ═══════════════════════════════════════
   SKETCH 1 — camera motion + blob grid
═══════════════════════════════════════ */
function sketch1(p) {
  let camera, prevImg, currImg, diffImg, grid;

  p.setup = function () {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.pixelDensity(1);
    camera = p.createCapture("video", { flipped: true });
    camera.hide();
    grid = new Grid(p.windowWidth, p.windowHeight);
  };

  p.draw = function () {
    p.background(63, 34, 236);

    // wait until camera feed has initialised
    if (!camera || camera.width === 0) return;

    camera.loadPixels();

    const smallW = Math.floor(camera.width  / 4);
    const smallH = Math.floor(camera.height / 4);

    currImg = p.createImage(smallW, smallH);
    currImg.copy(camera, 0, 0, camera.width, camera.height, 0, 0, smallW, smallH);
    currImg.filter(p.GRAY);
    currImg.filter(p.BLUR, 2);

    diffImg = p.createImage(smallW, smallH);
    diffImg.loadPixels();

    if (prevImg) {
      currImg.loadPixels();
      prevImg.loadPixels();
      for (let x = 0; x < currImg.width; x++) {
        for (let y = 0; y < currImg.height; y++) {
          const i = (x + y * currImg.width) * 4;
          const d = Math.abs(currImg.pixels[i] - prevImg.pixels[i]);
          diffImg.pixels[i]   = d;
          diffImg.pixels[i+1] = d;
          diffImg.pixels[i+2] = d;
          diffImg.pixels[i+3] = 255;
        }
      }
      diffImg.updatePixels();
    }

    prevImg = p.createImage(smallW, smallH);
    prevImg.copy(currImg, 0, 0, smallW, smallH, 0, 0, smallW, smallH);

    grid.update(diffImg);
  };

  p.windowResized = function () {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    grid = new Grid(p.windowWidth, p.windowHeight);
  };

  function Grid(_w, _h) {
    const nw = 5;
    const nX = Math.floor(_w / nw);
    const nY = Math.floor(_h / nw);
    const len = nX * nY;
    const states = new Array(len).fill(0);
    const colors = [];

    for (let i = 1; i < len; i++) {
      colors.push(p.lerpColor(p.color('#f9a770'), p.color('#845393'), 0.0001 * i));
    }

    this.update = function (img) {
      img.loadPixels();
      for (let x = 0; x < img.width; x++) {
        for (let y = 0; y < img.height; y++) {
          const idx = (x + y * img.width) * 4;
          const intensity = img.pixels[idx] / 255;
          if (intensity > 0.2) {
            const sx = p.map(x, 0, img.width,  0, _w);
            const sy = p.map(y, 0, img.height, 0, _h);
            const ni = Math.floor(sx / nw) + Math.floor(sy / nw) * nX;
            if (ni >= 0 && ni < len) states[ni] = Math.max(states[ni], intensity);
          }
        }
      }
      for (let i = 0; i < len; i++) {
        states[i] = p.constrain(states[i] - 0.02, 0, 1);
      }
      this.draw();
    };

    this.draw = function () {
      p.push();
      p.noStroke();
      for (let x = 0; x < nX; x++) {
        for (let y = 0; y < nY; y++) {
          const ni = x + y * nX;
          if (states[ni] > 0) {
            p.fill(colors[ni] || p.color('#f9a770'));
            p.ellipse(
              nw / 1 + 2 * x * nw,
              nw / 5 + 2 * y * nw,
              5 + states[ni] * 600
            );
          }
        }
      }
      p.pop();
    };
  }
}

/* ═══════════════════════════════════════
   SKETCH 2 — generative dot composition
═══════════════════════════════════════ */
function sketch2(p) {
  p.setup = function () {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.frameRate(60);
    p.noFill();
  };

  p.draw = function () {
    const W = p.width, H = p.height;
    p.background(245, 245, 245);

    // background gaussian scatter
    p.stroke(0);
    for (let i = 0; i < 5000; i++) {
      p.point(p.randomGaussian(W / 2, 400), p.random(0, H));
    }

    p.push();
    p.translate(W / 5, H / 4);

    // circle scatter
    p.stroke(100, 75, 50);
    for (let i = 0; i < 5000; i++) {
      const r = Math.max(p.random(2, 0), p.random(0, W / 8));
      const a = p.random(2, p.PI * 3);
      p.point(Math.cos(a) * r, Math.sin(a) * r);
    }

    // top line
    p.stroke(0, 29, 125);
    for (let i = 0; i < 500; i++) {
      p.point(p.random(90, 500), p.random(10, 45));
    }

    // bottom line
    for (let i = 0; i < 8000; i++) {
      p.point(p.random(10, 800), p.random(260, 510));
    }

    // left & right lines
    for (let i = 0; i < 8000; i++) {
      p.point(p.random(40,  110), Math.max(p.random(50,  100), p.random(10, 1000)));
      p.point(p.random(190, 350), Math.max(p.random(10,  330), p.random(80,  200)));
      p.point(p.random(40,   60), Math.max(p.random(10,   10), p.random(200, 500)));
    }

    // square — rotated slab
    p.push();
    p.stroke(255, 179, 15);
    p.rotate(-p.PI / 8);
    for (let i = 0; i < 60000; i++) {
      p.point(p.random(50, 800), p.random(80, 230));
    }
    p.pop();

    // square shadow
    p.push();
    p.stroke(126, 126, 126);
    p.rotate(-p.PI / 8);
    for (let i = 0; i < 3000; i++) {
      p.point(
        Math.min(p.random(50, 800), p.random(50, 800)),
        Math.max(p.random(80, 150), p.random(80, 230))
      );
    }
    p.pop();

    p.pop(); // end translate

    // wave black
    p.push();
    p.stroke(2);
    p.translate(0, H / 2 + 10);
    for (let i = 0; i < 8000; i++) {
      const wx = p.random(0, W);
      p.point(wx, Math.cos((wx / W) * p.PI * 80) * 20 + p.random(30, 50));
    }
    p.pop();

    // wave red
    p.push();
    p.stroke(224, 49, 0);
    p.translate(0, H / 2);
    for (let i = 0; i < 6000; i++) {
      const wx = p.random(2, W);
      p.point(wx, Math.cos((wx / W) * p.PI * 2) * 20 + p.random(10, 80));
    }
    p.pop();
  };

  p.windowResized = function () {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
  };
}

/* ═══════════════════════════════════════
   INSTANCE MANAGER
═══════════════════════════════════════ */
const container = document.getElementById('sketch-container');
const instances = [null, null];
let current = 0;

function boot(sketchFn, index) {
  const inst = new p5(sketchFn, container);
  // poll until canvas exists, then hide if not active
  const t = setInterval(() => {
    if (inst.canvas) {
      clearInterval(t);
      if (index !== current) inst.canvas.style.display = 'none';
    }
  }, 30);
  return inst;
}

instances[0] = boot(sketch1, 0);
instances[1] = boot(sketch2, 1);

function switchPage() {
  if (instances[current]?.canvas) instances[current].canvas.style.display = 'none';
  current = current === 0 ? 1 : 0;
  if (instances[current]?.canvas) instances[current].canvas.style.display = 'block';
  document.body.className = current === 0 ? 'page1' : 'page2';
  document.getElementById('pip1').classList.toggle('active', current === 0);
  document.getElementById('pip2').classList.toggle('active', current === 1);
}

document.getElementById('switch-btn').addEventListener('click', switchPage);
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); switchPage(); }
});
</script>
</body>
</html>
